services:
  postgres:
    image: "${POSTGRES_IMAGE:-pgvector/pgvector:0.8.2-pg18}"
    container_name: tw-national-exam-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-tw_national_exam_dev}"
      POSTGRES_USER: "${POSTGRES_USER:-national_exam}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-national_exam_dev_password}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./schemas/database/postgresql_extensions.sql:/docker-entrypoint-initdb.d/000_postgresql_extensions.sql:ro
      - ./schemas/database/postgresql_schema.sql:/docker-entrypoint-initdb.d/001_postgresql_schema.sql:ro

  review-ui:
    image: "${REVIEW_UI_IMAGE:-python:3.11-slim}"
    container_name: tw-national-exam-review-ui
    restart: unless-stopped
    working_dir: /workspace
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-national_exam}:${POSTGRES_PASSWORD:-national_exam_dev_password}@postgres:5432/${POSTGRES_DB:-tw_national_exam_dev}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      OPENAI_REVIEW_MODEL: "${OPENAI_REVIEW_MODEL:-gpt-4.1-mini}"
      OPENAI_REVIEW_TIMEOUT: "${OPENAI_REVIEW_TIMEOUT:-45}"
      REVIEW_UI_BACKEND: "${REVIEW_UI_BACKEND:-sql}"
    ports:
      - "${REVIEW_UI_BIND:-0.0.0.0}:${REVIEW_UI_PORT:-8765}:8765"
    volumes:
      - .:/workspace
    command:
      - sh
      - -c
      - python3 -m pip install -q -r requirements/review-ui.txt && python3 scripts/serve_question_review_ui.py --host 0.0.0.0 --port 8765 --review-backend "$${REVIEW_UI_BACKEND:-sql}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
